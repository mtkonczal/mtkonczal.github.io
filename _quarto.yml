project:
  type: website
  output-dir: docs

website:
  title: "Mike Konczal"

  page-footer:
    right: |
      <span class="container">Made with [Quarto](https://quarto.org/){target="_blank"} ([This Site's Repo](https://github.com/mtkonczal/mtkonczal.github.io){target="_blank"})</span>

  # Site navigation is a custom sidebar injected via the includes below
  # (see _includes/before-body.html). Quarto's built-in navbar/sidebar and
  # search are intentionally disabled.

format:
  html:
    theme: flatly
    css: styles.css
    toc: false
    page-layout: full
    include-before-body: _includes/before-body.html
    include-after-body: _includes/after-body.html
