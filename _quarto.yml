project:
  type: website
  output-dir: docs
  pre-render: scripts/sync-draftwatch-readme.sh

website:
  title: "Mike Konczal"
  site-url: https://www.mikekonczal.com
  description: "Economist and writer. Vice President of Policy and Research at the Economic Security Project, former chief economist at the White House National Economic Council, and author of Freedom from the Market."
  image: images/mkonczal_index.jpg
  open-graph: true
  twitter-card:
    creator: "@mtkonczal"
    card-style: summary_large_image

  page-footer:
    right: |
      <span class="container">Made with [Quarto](https://quarto.org/){target="_blank"} ([This Site's Repo](https://github.com/mtkonczal/mtkonczal.github.io){target="_blank"})</span>

  # Site navigation is a custom sidebar injected via the includes below
  # (see _includes/before-body.html). Quarto's built-in navbar/sidebar and
  # search are intentionally disabled.

format:
  html:
    theme: flatly
    css: styles.css
    toc: false
    page-layout: full
    include-in-header: _includes/in-header.html
    include-before-body: _includes/before-body.html
    include-after-body: _includes/after-body.html
