# Renders the Quarto site on GitHub's servers whenever source files change,
# and commits the regenerated docs/ back to main (which GitHub Pages serves).
#
# You no longer need to run `quarto render` locally: edit data/work_database.csv
# (or any .qmd) from anywhere, push, and the site updates in a few minutes.
#
# Loop prevention: the workflow's own commit only touches docs/ and the
# synced draftwatch readme, both of which are in paths-ignore below.

name: Build site

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "_includes/draftwatch-readme.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so rebase-on-retry always works

      - name: Validate work_database.csv
        run: python3 scripts/validate_work_database.py

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # binary packages, keeps installs fast

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::lubridate
            any::htmltools
            any::DT

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Commit rendered site
        run: |
          set -x  # trace every command so failures name themselves in the log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs || true
          git add _includes/draftwatch-readme.md || true
          if git diff --cached --quiet; then
            echo "No rendered changes to commit."
            exit 0
          fi
          git commit -m "Render site [skip ci]"
          # Push; if main moved while we rendered, rebase once and retry.
          git push origin HEAD:main || {
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          }
